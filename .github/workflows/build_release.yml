# ══════════════════════════════════════════════════════════════════════════════
# ФАЙЛ: .github/workflows/build_release.yml
# НАЗНАЧЕНИЕ: Собирает ПОДПИСАННЫЙ release APK когда вы создаёте git-тег
#             вида v1.0, v2.3 и т.д.
#             Создаёт GitHub Release и прикрепляет APK к нему.
#
# ТРЕБУЕТ НАСТРОЙКИ СЕКРЕТОВ в репозитории:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   KEYSTORE_BASE64   — keystore файл закодированный в base64
#                       Получить: base64 -w 0 my-release-key.jks
#   KEY_STORE_PASSWORD — пароль от keystore
#   KEY_ALIAS          — alias ключа в keystore
#   KEY_PASSWORD       — пароль ключа
#
# КАК СОЗДАТЬ KEYSTORE (один раз, локально):
#   keytool -genkey -v -keystore my-release-key.jks \
#     -alias autoloader -keyalg RSA -keysize 2048 -validity 10000
# ══════════════════════════════════════════════════════════════════════════════

name: Build Release APK

on:
  push:
    # Запускается только при push тега вида v1.0.0 или v2.3
    tags:
      - 'v*'
  # Ручной запуск для тестирования
  workflow_dispatch:

jobs:
  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Декодируем keystore из base64-секрета во временный файл
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks
          echo "Keystore decoded successfully"

      # Собираем release APK с подписью
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # Удаляем keystore из памяти
      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/release.jks

      # Получаем версию из тега (v1.2.3 → 1.2.3)
      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # Прикрепляем APK как artifact
      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoLoaderScania-release-v${{ steps.get_version.outputs.version }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # Создаём GitHub Release и прикрепляем APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AutoLoader Scania v${{ steps.get_version.outputs.version }}"
          body: |
            ## AutoLoader Scania 4×4 — v${{ steps.get_version.outputs.version }}
            
            Установка Uçsuoğlu (2008) · расчёт погрузки 8 автомобилей
            
            ### Установка
            Скачайте APK ниже и установите на Android 7.0+ (minSdk 24)
            
            ### Изменения
            Смотрите коммиты с момента предыдущего релиза
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
